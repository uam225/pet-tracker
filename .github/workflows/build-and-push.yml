name: Build and push images

# Builds the frontend and backend images on every push to main and
# publishes them to the GitHub Container Registry (GHCR). The production
# server pulls these pre-built images rather than building locally, which
# keeps the build toolchain (and its memory cost) off the e2-micro.
#
# Images are tagged with both :latest and the commit SHA. Deploying a
# specific SHA gives a reproducible rollback target.

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ghcr.io requires lowercase image names. The repository owner/name is
  # already lowercase here; if that ever changes, lowercase it explicitly.
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Typecheck gate: the frontend build no longer runs tsc (that was moved out
  # to speed up and de-risk the on-server build, and now the server doesn't
  # build at all). The typecheck still has to pass before images are pushed,
  # so a type error fails the pipeline here rather than shipping silently.
  # ---------------------------------------------------------------------------
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Build and push both images. Depends on the typecheck job passing.
  # ---------------------------------------------------------------------------
  build:
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to GHCR
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
          - name: backend
            context: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.name }}:latest
            ${{ env.IMAGE_BASE }}-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
