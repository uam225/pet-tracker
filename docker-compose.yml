# Development compose file.
# Hot-reload is enabled for both backend and frontend.
# The database is stored in ./data on the host machine.
# Run with: docker compose up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      # Mount source for hot-reload
      - ./backend/app:/app/app
      # Mount alembic for migrations during development
      - ./backend/alembic:/app/alembic
      # Persist the database on the host
      - ./data:/data
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: sqlite+aiosqlite:////data/pettracker.db
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      VITE_API_BASE_URL: ""
    ports:
      - "5173:5173"
    restart: unless-stopped
