version: "3.9"

# Production compose file.
# Caddy handles HTTPS termination and static file serving.
# The database lives on the persistent disk at /data.
# Run with: docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - /data:/data
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: sqlite+aiosqlite:////data/pettracker.db
    # No port exposure: Caddy proxies to the container by service name
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      # Named volume shared with Caddy for static file serving
      - frontend_build:/srv
    # This container exits after building. Caddy serves the output.
    restart: "no"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Caddy stores HTTPS certificates here; must persist across restarts
      - caddy_data:/data
      - caddy_config:/config
      # Serve the frontend build output
      - frontend_build:/srv:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_build:
  caddy_data:
  caddy_config:
