# Production compose file.
# Caddy handles HTTPS termination and static file serving.
# The database lives on the persistent disk at /data.
#
# Images are pre-built by GitHub Actions and pulled from GHCR; the server
# does not build. Deploy with:
#   ./scripts/deploy.sh
# or manually:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# IMAGE_TAG selects which image version to run. Defaults to 'latest'.
# To roll back, set IMAGE_TAG to a specific commit SHA, e.g.:
#   IMAGE_TAG=<sha> docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ghcr.io/uam225/pet-tracker-backend:${IMAGE_TAG:-latest}
    volumes:
      - /data:/data
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: sqlite+aiosqlite:////data/pettracker.db
    # No port exposure: Caddy proxies to the container by service name
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/uam225/pet-tracker-frontend:${IMAGE_TAG:-latest}
    volumes:
      # The init container copies the React build into this named volume,
      # which Caddy then mounts at /srv to serve static files.
      - frontend_build:/srv
    # This container exits after the copy. Caddy serves the output.
    restart: "no"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Caddy stores HTTPS certificates here; must persist across restarts
      - caddy_data:/data
      - caddy_config:/config
      # Serve the frontend build output
      - frontend_build:/srv:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_build:
  caddy_data:
  caddy_config:
